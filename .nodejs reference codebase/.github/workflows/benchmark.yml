name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmarks
        run: |
          echo "Running benchmarks..."
          pnpm vitest run api/tests/benchmarks --reporter=verbose || echo "Benchmarks completed with warnings"

      - name: Compare with baseline
        run: |
          node scripts/benchmark-compare.js --save || echo "Baseline established"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 30

      - name: Comment on PR (if regression)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'benchmark-results.json';
            
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const regressions = results.regressions || [];
              
              if (regressions.length > 0) {
                const severeRegressions = regressions.filter(r => r.percentChange > 10);
                
                if (severeRegressions.length > 0) {
                  github.rest.issues.createComment({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: `## ⚠️ Performance Regressions Detected
                    
                    The following benchmarks show significant slowdowns:
                    
                    ${severeRegressions.map(r => `- **${r.name}**: +${r.percentChange.toFixed(1)}%`).join('\n')}
                    
                    Please review these changes before merging.
                    `
                  });
                }
              }
            }
