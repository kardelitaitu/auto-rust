name: CI Fallback

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    VITEST_MAX_THREADS: 4
    VITEST_MIN_THREADS: 2

jobs:
    lint:
        runs-on: ubuntu-latest

        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ESLint
              run: pnpm run lint

    test-unit:
        runs-on: ubuntu-latest

        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Install bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Unit Tests
              run: pnpm run test:bun:unit

    test-integration:
        runs-on: ubuntu-latest

        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Install bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Integration Tests
              run: pnpm run test:bun:integration

    test-edge:
        runs-on: ubuntu-latest

        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Install bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Edge Case Tests
              run: pnpm run test:bun:edge

    build:
        runs-on: ubuntu-latest
        needs: [lint, test-unit, test-integration, test-edge]

        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Install bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build check
              run: |
                  if grep -q '"build":' package.json; then
                    pnpm build
                  else
                    echo "No build script defined - skipping"
                  fi
