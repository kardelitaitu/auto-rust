# Orchestrator Configuration

[browser]
max_discovery_retries = 3
discovery_retry_delay_ms = 5000
connectors = []
connection_timeout_ms = 30000

[browser.circuit_breaker]
enabled = true
failure_threshold = 5
success_threshold = 3
half_open_time_ms = 30000

[[browser.profiles]]
name = "brave-local"
type = "brave"
ws_endpoint = ""

[browser.roxybrowser]
enabled = true
api_url = "http://127.0.0.1:50000/"
api_key = "c6ae203adfe0327a63ccc9174c178dec"

[orchestrator]
max_global_concurrency = 20
task_timeout_ms = 600000
group_timeout_ms = 600000
worker_wait_timeout_ms = 10000
stuck_worker_threshold_ms = 120000
task_stagger_delay_ms = 2000
max_retries = 2
retry_delay_ms = 500

# Twitter Activity Task Configuration
# Controls engagement behavior and rate limits for twitteractivity task

[twitter_activity]
# Feed scanning settings
feed_scan_duration_ms = 120000      # 2 minutes
feed_scroll_count = 12               # Number of scroll actions per scan
engagement_candidate_count = 5       # Number of tweets to consider for engagement

# Engagement limits (prevent rate limits and account restrictions)
[twitter_activity.engagement_limits]
max_likes = 5                        # Maximum likes per session
max_retweets = 3                     # Maximum retweets per session
max_follows = 2                      # Maximum follows per session
max_replies = 1                      # Maximum replies per session
max_thread_dives = 3                 # Maximum thread reads per session
max_bookmarks = 0                    # Disabled in V1 (set to 0)
max_total_actions = 10               # Total engagement actions cap per session

# LLM Configuration (V2 - for smart replies & quote tweets)
[twitter_activity.llm]
enabled = false                      # Set true to enable LLM features
provider = "ollama"                  # "ollama" or "openrouter"
model = "llama3.2:latest"            # Ollama model name
temperature = 0.7                    # Creativity (0.0-1.0)
max_tokens = 100                     # Max reply length
timeout_ms = 30000                   # 30s timeout for generation
reply_probability = 0.05             # 5% of eligible tweets
quote_tweet_probability = 0.15       # 15% of retweets become quote tweets

# Environment variable overrides:
# TWITTER_MAX_LIKES=5
# TWITTER_MAX_RETWEETS=3
# TWITTER_MAX_FOLLOWS=2
# TWITTER_MAX_REPLIES=1
# TWITTER_MAX_TOTAL_ACTIONS=10
# TWITTER_LLM_ENABLED=true
# TWITTER_LLM_PROVIDER=ollama
# TWITTER_LLM_MODEL=llama3.2:latest
# TWITTER_LLM_REPLY_PROBABILITY=0.05
# TWITTER_LLM_QUOTE_PROBABILITY=0.15
