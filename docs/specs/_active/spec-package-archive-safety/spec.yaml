id: spec-package-archive-safety
title: Spec package archive safety
status: approved
owner: spec-agent
implementer: done
priority: P2
area:
  - docs
  - tooling
  - workflow
  - tests
files:
  code:
    - spec-lint.ps1
    - spec-archive.ps1
  docs:
    - docs/specs/README.md
    - docs/specs/_template/README.md
    - docs/specs/_active/spec-package-archive-safety/README.md
    - docs/specs/_active/spec-package-archive-safety/baseline.md
    - docs/specs/_active/spec-package-archive-safety/internal-api-outline.md
    - docs/specs/_active/spec-package-archive-safety/plan.md
    - docs/specs/_active/spec-package-archive-safety/validation-checklist.md
    - docs/specs/_active/spec-package-archive-safety/ci-commands.md
    - docs/specs/_active/spec-package-archive-safety/decisions.md
    - docs/specs/_active/spec-package-archive-safety/quality-rules.md
    - docs/specs/_active/spec-package-archive-safety/implementation-notes.md
acceptance:
  - Archive helper moves an approved or implementing package to `_done/` and rewrites both status fields to `done`.
  - `_done` packages cannot remain in a non-done status after archival.
  - `spec-lint.ps1` names the offending package and the exact `_done` status mismatch when lint fails.
  - `docs/specs/README.md` documents the archive helper and the required status sync step.
  - `docs/specs/_template/README.md` keeps the archive rule visible to future spec authors.
  - `.\\check-fast.ps1` and `.\\check.ps1` pass after the workflow update lands.
non_goals:
  - Do not change the spec schema or file layout.
  - Do not auto-correct files inside `spec-lint.ps1`.
  - Do not relax the `_done` status rule.
  - Do not alter the active or done bucket semantics.
risks:
  - A helper script can drift from lint if one is updated without the other.
  - Overly broad automation could hide the status rule instead of teaching it.
