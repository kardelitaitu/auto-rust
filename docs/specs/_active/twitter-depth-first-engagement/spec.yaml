acceptance:
  - Automation can engage with multiple high-quality replies during a single thread dive.
  - Thread replies are scanned and filtered using existing Smart Decision logic.
  - Reduced navigation overhead (fewer jumps back to home feed).
  - Main loop respects global engagement limits across both root tweets and replies.
non_goals:
  - Infinite thread depth (limit to top-level replies or a configurable depth).
  - Engaging with every single reply (only high-quality candidates).
risks:
  - Increased time spent inside a single thread could lead to "getting stuck" if scrolling fails.
  - Engagement limits could be hit faster, requiring smarter prioritization.
