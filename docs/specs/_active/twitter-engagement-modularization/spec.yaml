acceptance:
  - `twitteractivity_engagement.rs` (1336 lines) split into 3-4 focused submodules
  - Each submodule under 400 lines
  - Single `engagement/` directory with clean public API
  - `process_candidate()` function preserved as main entry point
  - No behavioral changes to engagement logic
  - All existing tests pass
  - New submodules independently testable
