acceptance:
  - unwrap() count reduced by 80% in target files
  - All unwrap() calls have documented safety invariants or are replaced
  - New error types for Twitter-specific failure modes
  - Circuit breaker pattern implemented for retry logic
  - No panic paths in hot code paths
  - All errors properly propagate with context
non_goals:
  - Eliminating all unwrap() (some are truly invariant-safe)
  - Changing retry algorithms
  - Adding new error recovery strategies
  - Changes to non-twitter modules
risks:
  - Replacing unwrap() with ? may change error types - cascade effect
  - Some unwraps may be safety-critical - need careful analysis
  - Error type changes may break existing error handling
