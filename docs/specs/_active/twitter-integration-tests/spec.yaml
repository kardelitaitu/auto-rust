acceptance:
  - Mock browser framework for Twitter DOM simulation
  - Integration tests for full feed loop execution
  - Integration tests for thread dive scenarios
  - Integration tests for limit enforcement
  - Integration tests for error recovery paths
  - 80%+ coverage of twitter module public API
  - Tests run in < 30 seconds total
  - No external dependencies (pure mock-based)
non_goals:
  - End-to-end tests with real browser
  - Performance benchmarks
  - Visual regression tests
  - Load/stress testing
risks:
  - Mock DOM may not capture all real Twitter quirks
  - Test maintenance burden as Twitter UI changes
  - Large mock data fixtures needed
