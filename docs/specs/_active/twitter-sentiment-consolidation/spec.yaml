acceptance:
  - 6 sentiment modules consolidated into 2-3 cohesive modules
  - Single `SentimentAnalyzer` interface for all analysis needs
  - All existing sentiment detection methods preserved (emoji, domain, context, LLM)
  - ~50% code reduction (target: ~2,400 lines vs ~4,800)
  - No regression in sentiment detection accuracy
  - Clean public API with minimal exports
non_goals:
  - Improving sentiment detection algorithms
  - Adding new sentiment signals
  - Changes to decision engine consumers
  - Externalizing sentiment data to config files
risks:
  - Emoji/Domain detection logic is large - risk of losing nuance during consolidation
  - Multiple Sentiment type definitions may conflict
  - Context-aware scoring logic is complex - easy to break
