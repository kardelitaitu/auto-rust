acceptance:
  - `spec-stash.ps1` creates a named git stash checkpoint that includes untracked files and prints the created stash ref.
  - `spec-restore.ps1` can apply the latest stash checkpoint or a named ref and uses a safer apply-first flow by default.
  - Both scripts refuse to run outside the repository root.
  - `AGENTS.md`, `docs/specs/README.md`, and `docs/specs/_template/README.md` explain when to checkpoint and how to restore after a mistake.
  - `spec-lint.ps1` and `.\check-fast.ps1` pass after the workflow change lands.
non_goals:
  - Do not add automatic branch switching or merge handling.
  - Do not change spec package format or lint rules.
  - Do not use git reset as the primary recovery path.
  - Do not modify runtime task code.
risks:
  - A stash checkpoint can still conflict when restored onto a dirty tree.
  - Overusing stash can hide changes if the ref is not recorded clearly.
