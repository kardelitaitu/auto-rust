id: benchmarks-in-src
title: Move benchmark harnesses into src
status: done
owner: spec-agent
implementer: implementation-agent
priority: P3
area:
  - benchmarks
  - cargo
  - src-layout
files:
  code:
    - Cargo.toml
    - benches/
    - src/benchmarks/
    - src/benchmark_support/
    - src/utils/mouse/trajectory.rs
    - src/utils/accessibility_locator.rs
    - src/adaptive/predictive_scorer.rs
    - src/adaptive/mod.rs
    - src/utils/mod.rs
  docs:
    - README.md
