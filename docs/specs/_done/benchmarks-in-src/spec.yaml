acceptance:
  - Benchmark harnesses live under src/ and Cargo points at the new paths.
  - Benchmark code uses real library modules, not copied benchmark-only logic.
  - cargo bench and ./check.ps1 pass after the move.
  - Root benches/ is removed after parity is confirmed.
non_goals:
  - Do not turn benchmark files into runtime modules.
  - Do not widen public API beyond the minimal seam needed for benchmarks.
risks:
  - accessibility locator is feature-gated today.
  - predictive scorer may need a small public seam before it can be benchmarked.
