acceptance:
  - BrowserConnector exists as the discovery/connect boundary for the supported browser sources.
  - SessionFactory owns `Session` construction and attaches browser capability data.
  - SessionPoolManager handles parallel discovery and retry without changing the current filter semantics.
  - `browser.rs` becomes a thin orchestration layer instead of the place where discovery and assembly are coupled.
  - Existing browser filter and connection timeout behavior remain stable.
  - .\check-fast.ps1 and .\check.ps1 pass after the refactor lands.
non_goals:
  - Do not change task parsing or CLI dispatch.
  - Do not change task execution or shutdown semantics.
  - Do not add new browser driver families.
  - Do not refactor task interaction code here.
risks:
  - Startup flow can become harder to follow if the connector split is too large.
  - Discovery retries can get flaky if tests depend on real browser timing instead of mocks.
