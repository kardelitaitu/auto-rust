version: 1
id: ci-coverage-gate-no-report
title: CI coverage gate with no report
status: done
owner: spec-agent
implementer: archived-pending
priority: P3
area:
  - ci
  - coverage
  - tooling
files:
  code:
    - .github/workflows/ci.yml
  docs:
    - docs/specs/_active/ci-coverage-gate-no-report/README.md
    - docs/specs/_active/ci-coverage-gate-no-report/baseline.md
    - docs/specs/_active/ci-coverage-gate-no-report/internal-api-outline.md
    - docs/specs/_active/ci-coverage-gate-no-report/plan.md
    - docs/specs/_active/ci-coverage-gate-no-report/validation-checklist.md
    - docs/specs/_active/ci-coverage-gate-no-report/ci-commands.md
    - docs/specs/_active/ci-coverage-gate-no-report/decisions.md
    - docs/specs/_active/ci-coverage-gate-no-report/quality-rules.md
    - docs/specs/_active/ci-coverage-gate-no-report/implementation-notes.md
acceptance:
  - CI keeps the 40% coverage floor.
  - CI no longer generates HTML, JSON, or uploaded coverage artifacts.
  - The workflow uses a no-report coverage run instead of report generation.
  - Local coverage tooling stays available for manual inspection.
  - `.\\check-fast.ps1` and `.\\check.ps1` still pass after the workflow change.
non_goals:
  - Do not remove the coverage floor.
  - Do not change runtime code.
  - Do not change the local coverage script.
risks:
  - Removing the report may hide detail that some contributors still want locally.
  - A no-report gate can still be slower than a plain test job.

