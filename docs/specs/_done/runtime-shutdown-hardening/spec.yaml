acceptance:
  - Cancellation before worker acquisition does not leave the session stuck in Busy.
  - Cancellation during task execution unwinds cleanly and releases owned runtime resources.
  - Cancellation during backoff stops retry flow without hiding the cancellation cause.
  - Cancellation after page acquisition releases the page or permit path correctly.
  - Final session state resolves to Idle or Failed, never stale Busy.
  - Cancellation remains explicit and is not inferred from error message text.
non_goals:
  - Do not redesign CLI parsing or task registration.
  - Do not redesign browser discovery or session construction.
  - Do not introduce a new task interaction pipeline in this spec.
risks:
  - Test timing can become flaky if the timing cases are not isolated from real browser startup.
  - Cleanup regressions can hide behind generic error handling if cancellation is not modeled explicitly.
