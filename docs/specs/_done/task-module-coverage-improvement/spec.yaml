acceptance:
  - twitteractivity.rs gains new tests for payload/config helpers and entry-point selection.
  - twitterfollow.rs gains new tests for candidate ordering and URL or username extraction.
  - twitterintent.rs gains new tests for intent parsing and payload URL extraction.
  - Any browser-backed checks stay narrow and deterministic.
  - Public task behavior stays stable in the existing task API behavior coverage.
  - .\check-fast.ps1 and .\check.ps1 pass after the coverage work lands.
non_goals:
  - Do not refactor CLI registry or task parsing.
  - Do not redesign browser discovery or session assembly.
  - Do not change the public task API surface.
  - Do not use this spec for coverage tooling changes.
risks:
  - Browser-heavy tests can become flaky if the spec grows beyond helper coverage.
  - Tests that lock onto exact log text can become brittle when messages are tuned.
