acceptance:
  - Click and type share a common internal interaction pipeline instead of duplicating preflight and postflight logic.
  - The public TaskContext verbs keep the same names and signatures.
  - Click, nativeclick, focus, select_all, clear, keyboard, and type_text still behave as expected on representative selectors.
  - Post-action pause and verification rules are applied consistently and do not drift between verbs.
  - Shared interaction types make the action flow easier to test and reason about.
  - Reliability regressions are caught by focused tests before handoff.
non_goals:
  - Do not redesign the public TaskContext API.
  - Do not move unrelated runtime behavior into the pipeline.
  - Do not use this spec to refactor browser discovery or shutdown logic.
risks:
  - Over-sharing the pipeline can make the module harder to read if the action kinds are not kept small.
  - Browser-backed tests can become flaky if they depend on timing instead of explicit state checks.
