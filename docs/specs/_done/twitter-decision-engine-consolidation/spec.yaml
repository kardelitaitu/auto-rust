acceptance:
  - Single unified decision engine replaces 5 separate engines
  - All existing decision strategies (legacy, hybrid, LLM, persona) available as plugins
  - No regression in decision quality (measured by action appropriateness)
  - Public API surface reduced by 60% (fewer exports from mod.rs)
  - Test coverage maintained or improved
non_goals:
  - Changing decision logic algorithms (preserve existing behavior)
  - Adding new decision strategies
  - Modifying downstream consumers (engagement.rs, etc.)
risks:
  - Subtle behavior changes during consolidation if logic is not preserved exactly
  - Breaking changes to internal APIs used by engagement module
  - Increased complexity in unified engine if plugin system is over-engineered
