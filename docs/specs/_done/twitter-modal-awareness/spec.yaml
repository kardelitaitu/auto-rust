acceptance:
  - is_on_tweet_page returns true when a tweet modal is visible even if URL is x.com/home
  - Engagement buttons inside modals are prioritized over background feed tweets
  - Retweet, Like, and Reply actions work correctly inside Twitter thread modals
non_goals:
  - Support for every possible Twitter overlay (only thread modals for now)
risks:
  - DOM changes in Twitter's modal structure could break selectors
  - False positives in modal detection if multiple dialogs are present
