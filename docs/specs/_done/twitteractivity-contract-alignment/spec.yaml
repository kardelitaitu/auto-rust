acceptance:
  - Missing `duration_ms` resolves from the task config instead of a hardcoded fallback.
  - `scroll_count` is part of the runtime contract and actually affects the feed scroll budget.
  - Malformed numeric payload fields reject with validation errors instead of silently defaulting.
  - The task docs and config examples match the runtime contract after the change.
  - Regression tests cover default resolution, explicit overrides, malformed payloads, and scroll behavior.
  - `.\check-fast.ps1` and `.\check.ps1` pass after the contract repair lands.
non_goals:
  - Do not redesign the TwitterActivity sentiment or persona engine.
  - Do not refactor browser discovery, session assembly, or shutdown behavior.
  - Do not change the public task name or introduce new task verbs.
  - Do not widen the scope to other Twitter tasks unless a shared helper is clearly required.
risks:
  - Tightening payload validation may break callers that relied on permissive fallback behavior.
  - Wiring `scroll_count` into the runtime can change task duration if docs and config disagree.
